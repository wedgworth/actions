name: Shared AppPack Deploy
on:
  workflow_call:
    inputs:
      app-name:
        required: true
        type: string
        description: "AppPack app name"
      image:
        required: true
        type: string
        description: "Docker image to deploy (ghcr.io reference)"
      aws-region:
        required: false
        type: string
        default: "us-east-1"
        description: "AWS region"
    secrets:
      CR_UN:
        required: true
      CR_PAT:
        required: true
      APPPACK_ROLE_ARN:
        required: true

jobs:
  deploy:
    name: Deploy
    runs-on: namespace-profile-default
    env:
      APPPACK_ROLE_ARN: ${{ secrets.APPPACK_ROLE_ARN }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Docker
        uses: wedgworth/actions/.github/actions/setup-docker@main
        with:
          cr-username: ${{ secrets.CR_UN }}
          cr-token: ${{ secrets.CR_PAT }}

      - name: Pull Image
        run: docker pull ${{ inputs.image }}

      - name: Download Logs
        uses: actions/download-artifact@v4
        with:
          name: apppack-logs

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.APPPACK_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}

      - name: AppPack Deploy
        uses: apppackio/deploy-action@v2
        with:
          appname: ${{ inputs.app-name }}
          image: ${{ inputs.image }}
