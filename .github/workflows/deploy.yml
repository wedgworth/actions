name: Shared Deploy
on:
  workflow_call:
    inputs:
      app-name:
        required: true
        type: string
        description: "Heroku app name to deploy to"
      processes:
        required: true
        type: string
        description: "Space-separated list of processes to deploy (e.g., 'web worker release')"
    secrets:
      HEROKU_API_KEY:
        required: true
      CR_UN:
        required: true
      CR_PAT:
        required: true

jobs:
  deploy:
    name: Deploy
    runs-on: namespace-profile-default
    env:
      HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Docker
        uses: wedgworth/actions/.github/actions/setup-docker@main
        with:
          cr-username: ${{ secrets.CR_UN }}
          cr-token: ${{ secrets.CR_PAT }}

      - name: Setup Heroku
        uses: wedgworth/actions/.github/actions/setup-heroku@main
        with:
            api-key: ${{ secrets.HEROKU_API_KEY }}

      # TEMP: Heroku registry rejects OCI mediatypes / attestations.
      # Replace with `heroku container:push` when migrated to AWS ECS.
      - name: Build and Push to Heroku Registry
        working-directory: ./deploy
        run: |
          for process in ${{ inputs.processes }}; do
            docker buildx build \
              --provenance=false \
              --sbom=false \
              --output=type=registry,oci-mediatypes=false \
              --tag=registry.heroku.com/${{ inputs.app-name }}/$process \
              --build-arg=VERSION=main \
              --build-arg=GITHUB_SHA=${{ github.sha }} \
              -f Dockerfile.$process \
              .
          done

      - name: Deploy
        run: heroku container:release -a ${{ inputs.app-name }} ${{ inputs.processes }}
