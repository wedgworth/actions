name: Shared Test and Build
on:
  workflow_call:
    inputs:
      python-src-dir:
        required: true
        type: string
        description: "Directory containing Python source code to lint"
      has-frontend:
        required: false
        type: boolean
        default: true
        description: "Whether this project has frontend code to test"
      package-manager:
        required: false
        type: string
        default: "pnpm"
        description: "Node package manager to use (pnpm or yarn)"
    outputs:
      version:
        description: "Docker image version tag"
        value: ${{ jobs.build-and-push-images.outputs.version }}
      tags:
        description: "Docker image tags"
        value: ${{ jobs.build-and-push-images.outputs.tags }}
    secrets:
      CODECOV_TOKEN:
        required: true
      CR_UN:
        required: true
      CR_PAT:
        required: true
      SENTRY_AUTH_TOKEN:
        required: true

env:
  PYTHON_VERSION: "3.14"
  NODE_VERSION: "22"

jobs:
  lint-python:
    name: Lint - Python
    runs-on: namespace-profile-default
    steps:
      - uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ github.token }}
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Lint
        uses: astral-sh/ruff-action@v3
        with:
          src: ${{ inputs.python-src-dir }}

  install-node-deps:
    name: Install Node Dependencies
    runs-on: namespace-profile-default
    if: inputs.has-frontend
    steps:
      - uses: actions/checkout@v6
      - uses: wedgworth/actions/.github/actions/setup-node-pnpm@main
        if: ${{ inputs.package-manager == 'pnpm' }}
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: wedgworth/actions/.github/actions/setup-node-yarn@apppack-migration
        if: ${{ inputs.package-manager == 'yarn' }}
        with:
          node-version: ${{ env.NODE_VERSION }}

  test-frontend:
    name: Test - Frontend
    runs-on: namespace-profile-default
    if: inputs.has-frontend
    needs: [install-node-deps]
    steps:
      - uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ github.token }}

      - uses: actions/checkout@v6

      - uses: wedgworth/actions/.github/actions/setup-node-pnpm@main
        if: ${{ inputs.package-manager == 'pnpm' }}
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: wedgworth/actions/.github/actions/setup-node-yarn@apppack-migration
        if: ${{ inputs.package-manager == 'yarn' }}
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Test
        run: ${{ inputs.package-manager }} test

      - uses: wedgworth/actions/.github/actions/report-coverage@main
        with:
          codecov-token: ${{ secrets.CODECOV_TOKEN }}
          coverage-file: ./js-coverage/coverage-final.json
          flags: frontend

  bundle-tracking:
    name: Bundle Tracking
    runs-on: namespace-profile-default
    if: inputs.has-frontend
    needs: [install-node-deps]
    steps:
      - uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ github.token }}

      - uses: actions/checkout@v6

      - uses: wedgworth/actions/.github/actions/setup-node-pnpm@main
        if: ${{ inputs.package-manager == 'pnpm' }}
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: wedgworth/actions/.github/actions/setup-node-yarn@apppack-migration
        if: ${{ inputs.package-manager == 'yarn' }}
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build and Upload Bundle
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: ${{ inputs.package-manager }} build
          
  build-and-push-images:
    name: Build, Test and Push Images
    runs-on: namespace-profile-builder
    needs: [lint-python, test-frontend, bundle-tracking]
    if: |
      always() &&
      (needs.lint-python.result == 'success') &&
      (!inputs.has-frontend || needs.test-frontend.result == 'success')
    services:
      redis:
        image: redis
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      postgres:
        image: postgres
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_SSL: "off"
      DATABASE_URL: "postgres://postgres:postgres@localhost:5432/postgres"
      DJANGO_DEBUG: 0
      REDIS_URL: "redis://localhost:6379"
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - uses: wedgworth/actions/.github/actions/setup-docker@main
        with:
          cr-username: ${{ secrets.CR_UN }}
          cr-token: ${{ secrets.CR_PAT }}

      - name: Extract Tags
        uses: wedgworth/actions/.github/actions/docker-tags@main
        id: meta
        with:
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            type=semver,pattern={{raw}}
            type=sha

      - name: Build Test Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./.docker/Dockerfile
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          load: true
          build-args: |
            DEV_MODE=1
            GIT_COMMIT=${{ github.sha }}
            GITHUB_SHA=${{ github.sha }}
            GIT_VERSION=${{ github.ref }}
            VERSION=${{ steps.meta.outputs.version }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Check Migrations
        run: docker run -e DATABASE_URL --network host ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }} python manage.py makemigrations --check --dry-run

      - name: Python Test
        env:
          GITHUB_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -o pipefail
          mkdir ci-shared && \
          chmod 777 ci-shared && \
          docker run \
            -v "${{ github.workspace }}/ci-shared:/opt/shared" \
            -e DATABASE_URL \
            -e REDIS_URL \
            -e GITHUB_SHA \
            --network host\
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }} ./test.sh 2>&1 | tee test.log

      - uses: wedgworth/actions/.github/actions/report-coverage@main
        with:
            codecov-token: ${{ secrets.CODECOV_TOKEN }}
            coverage-file: ./ci-shared/coverage.xml
            flags: backend

      - name: Build and Push Production Image
        id: build-prod
        if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/apppack-migration' || startsWith(github.ref, 'refs/tags/') }}
        shell: bash
        run: |
          set -o pipefail
          TAG_FLAGS=$(echo "${{ steps.meta.outputs.tags }}" | sed 's/^/--tag /')
          docker buildx build \
            --push \
            --file ./.docker/Dockerfile \
            $TAG_FLAGS \
            --build-arg DEV_MODE=0 \
            --build-arg GIT_COMMIT=${{ github.sha }} \
            --build-arg GITHUB_SHA=${{ github.sha }} \
            --build-arg GIT_VERSION=${{ github.ref }} \
            --build-arg VERSION=${{ steps.meta.outputs.version }} \
            --build-arg "SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}" \
            . 2>&1 | tee build.log

      - name: Upload Logs
        if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/apppack-migration' || startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: apppack-logs
          path: |
            test.log
            build.log
